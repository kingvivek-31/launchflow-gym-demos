<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Just Fitt Gym – Forge Your Limits | Sector 11 Dwarka, Delhi</title>
    <meta name="description"
        content="Just Fitt Gym – Delhi's most inclusive unisex gym in Sector 11 Dwarka. Strength, Cardio, Personal Training, Sauna. Rated 4.7★ by 553+ members. Open till 11 PM." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Tailwind v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        red: { DEFAULT: '#D72638', dark: '#B01E2D', light: '#F03A4E' },
                        black: { DEFAULT: '#0A0A0A', card: '#111111', border: '#1E1E1E' },
                    },
                    fontFamily: {
                        bebas: ['"Bebas Neue"', 'sans-serif'],
                        playfair: ['"Playfair Display"', 'serif'],
                        barlow: ['Barlow', 'sans-serif'],
                    },
                    animation: {
                        ticker: 'ticker 30s linear infinite',
                        'fade-up': 'fadeUp 0.6s ease both',
                        'pulse-dot': 'pulseDot 2s ease-in-out infinite',
                    },
                    keyframes: {
                        ticker: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } },
                        fadeUp: { '0%': { opacity: '0', transform: 'translateY(24px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        pulseDot: { '0%,100%': { opacity: '1', transform: 'scale(1)' }, '50%': { opacity: '0.4', transform: 'scale(1.5)' } },
                    },
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-[#0A0A0A] font-barlow text-white overflow-x-hidden">

    <!-- Custom Cursor -->
    <div id="cursorDot" class="cursor-dot"></div>
    <div id="cursorRing" class="cursor-ring"></div>

    <!-- ═══════════ NAVBAR ═══════════ -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-20">
            <!-- Logo -->
            <a href="#" data-page="home" class="flex flex-col leading-none group">
                <span
                    class="font-bebas text-2xl tracking-widest text-white group-hover:text-[#D72638] transition-colors">JUST
                    FITT</span>
                <span class="font-bebas text-xs tracking-[0.4em] text-[#D72638]">GYM</span>
            </a>

            <!-- Desktop Links -->
            <ul class="hidden md:flex items-center gap-10">
                <li><a href="#" data-page="home" id="nav-home"
                        class="nav-link font-barlow text-sm font-medium tracking-widest uppercase text-white/70 hover:text-white transition-colors relative after:absolute after:-bottom-1 after:left-0 after:h-px after:bg-[#D72638] after:transition-all after:duration-300 after:w-0 hover:after:w-full">Home</a>
                </li>
                <li><a href="#" data-page="about" id="nav-about"
                        class="nav-link font-barlow text-sm font-medium tracking-widest uppercase text-white/70 hover:text-white transition-colors relative after:absolute after:-bottom-1 after:left-0 after:h-px after:bg-[#D72638] after:transition-all after:duration-300 after:w-0 hover:after:w-full">About</a>
                </li>
                <li><a href="#" data-page="classes" id="nav-classes"
                        class="nav-link font-barlow text-sm font-medium tracking-widest uppercase text-white/70 hover:text-white transition-colors relative after:absolute after:-bottom-1 after:left-0 after:h-px after:bg-[#D72638] after:transition-all after:duration-300 after:w-0 hover:after:w-full">Classes</a>
                </li>
                <li><a href="#" data-page="pricing" id="nav-pricing"
                        class="nav-link font-barlow text-sm font-medium tracking-widest uppercase text-white/70 hover:text-white transition-colors relative after:absolute after:-bottom-1 after:left-0 after:h-px after:bg-[#D72638] after:transition-all after:duration-300 after:w-0 hover:after:w-full">Pricing</a>
                </li>
            </ul>

            <!-- CTA -->
            <a href="tel:+919899450419"
                class="hidden md:inline-flex items-center gap-2 bg-[#D72638] text-white font-bebas tracking-widest text-sm px-6 py-3 hover:bg-[#B01E2D] transition-colors">JOIN
                NOW</a>

            <!-- Hamburger -->
            <button id="hamburger" class="md:hidden flex flex-col gap-1.5 p-2" aria-label="Menu">
                <span class="block w-6 h-0.5 bg-white transition-all"></span>
                <span class="block w-6 h-0.5 bg-white transition-all"></span>
                <span class="block w-4 h-0.5 bg-white transition-all"></span>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="md:hidden hidden bg-black/95 backdrop-blur-md border-t border-white/10">
            <ul class="flex flex-col px-6 py-6 gap-4">
                <li><a href="#" data-page="home"
                        class="nav-link block font-bebas tracking-widest text-lg text-white/80 hover:text-[#D72638] transition-colors">HOME</a>
                </li>
                <li><a href="#" data-page="about"
                        class="nav-link block font-bebas tracking-widest text-lg text-white/80 hover:text-[#D72638] transition-colors">ABOUT</a>
                </li>
                <li><a href="#" data-page="classes"
                        class="nav-link block font-bebas tracking-widest text-lg text-white/80 hover:text-[#D72638] transition-colors">CLASSES</a>
                </li>
                <li><a href="#" data-page="pricing"
                        class="nav-link block font-bebas tracking-widest text-lg text-white/80 hover:text-[#D72638] transition-colors">PRICING</a>
                </li>
                <li><a href="tel:+919899450419"
                        class="inline-block bg-[#D72638] text-white font-bebas tracking-widest px-6 py-3 mt-2">+91 98994
                        50419</a></li>
            </ul>
        </div>
    </nav>

    <!-- ═══════════ PAGES ═══════════ -->
    <div id="app"></div>

    <!-- Templates loaded from JS -->
    <script src="pages/home.js"></script>
    <script src="pages/about.js"></script>
    <script src="pages/classes.js"></script>
    <script src="pages/pricing.js"></script>
    <script src="app.js"></script>
</body>

</html>
